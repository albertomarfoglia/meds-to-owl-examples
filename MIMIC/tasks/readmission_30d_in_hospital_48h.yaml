description: >-
  Prediction of 30-day hospital readmission for patients who were **not admitted to the ICU**.
  This task uses only the last 48 hours of hospital data before discharge, with a 24-hour gap
  between the input window and the target window. Patients who die or are discharged in the gap
  window are excluded. This preserves temporal separation and aligns with the non-ICU cohort
  design in the paper.

predicates:
  hospital_admission:
    code: { regex: "HOSPITAL_ADMISSION//.*" }
  hospital_discharge:
    code: { regex: "HOSPITAL_DISCHARGE//.*" }
  death:
    code: MEDS_DEATH
  discharge_or_death:
    expr: or(hospital_discharge, death)

trigger: hospital_discharge

windows:
  input:
    start: trigger - 48h
    end: trigger
    start_inclusive: True
    end_inclusive: True
    index_timestamp: end

  gap:
    start: input.end
    end: start + 24h
    start_inclusive: False
    end_inclusive: True
    has:
      hospital_admission: (None, 0)
      discharge_or_death: (None, 0)

  target:
    start: gap.end
    end: start + 30d
    start_inclusive: False
    end_inclusive: True
    label: hospital_admission

  censoring_protection_window:
    start: target.end
    end: NULL
    start_inclusive: False
    end_inclusive: True
    has:
      _ANY_EVENT: (1, None)